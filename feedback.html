<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Stamps Diary - Feedback</title>
    <!-- This links to our CSS file to make things look pretty! -->
    <link rel="stylesheet" href="style.css?v=2" />
</head>

<body>
    <!-- This is the top part of our website with the main title -->
    <header>
        <h1>Leave Feedback</h1>
        <p>Tell us what you think</p>
    </header>

    <!-- Here is our menu so people can click to other pages -->
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="category.html">CATEGORY</a></li>
            <li><a href="feedback.html">FEEDBACK</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>

    <!-- This is where the main text and pictures go for this page -->
    <section class="main-content">
        <h2>Feedback Forum</h2>
        <p>We appreciate your thoughts! Please leave your feedback below.</p>

        <!-- A simple form for users to fill out -->
        <form action="#" method="get">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" />
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" />
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" cols="50" rows="7"></textarea>
            </div>

            <div class="form-group">
                <input type="submit" value="Submit Feedback" />
            </div>
        </form>

    </section>

    <!-- The bottom part of our website -->
    <footer>
        <p>&copy; 2024 Stamps Diary. All rights reserved.</p>
    </footer>
</body>

</html>
